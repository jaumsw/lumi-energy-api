services:
  - type: web
    name: lumi-energy-api
    runtime: node
    region: oregon          # Render não tem SA; oregon é o mais próximo do Brasil
    plan: free
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false         # Será preenchido manualmente no dashboard do Render
      - key: DIRECT_URL
        sync: false         # Idem
      - key: GEMINI_API_KEY
        sync: false         # Idem
      - key: USE_REAL_LLM
        value: true
